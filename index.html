<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Horizon | リアルタイム世界ニュース</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      :root {
        --primary: #4f46e5;
        --secondary: #94a3b8;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --live-color: #ef4444;
        --font-display: 'Playfair Display', serif;
        --font-main: 'Outfit', sans-serif;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: var(--font-main);
        line-height: 1.5;
        overflow-x: hidden;
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        min-height: 100vh;
      }

      #app { display: flex; flex-direction: column; min-height: 100vh; }

      .glass-header {
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        background: rgba(15, 23, 42, 0.8);
        border-bottom: 1px solid var(--glass-border);
        padding: 1.25rem 2rem;
        display: flex; justify-content: space-between; align-items: center;
      }

      .logo { display: flex; align-items: center; gap: 0.75rem; }
      .logo i { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
      .logo h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; }
      .logo h1 span { font-weight: 300; opacity: 0.8; }

      .country-selector { display: flex; gap: 0.5rem; }
      .country-btn {
        background: transparent; border: 1px solid var(--glass-border);
        color: var(--text-main); padding: 0.5rem 1rem; border-radius: 9999px;
        cursor: pointer; transition: var(--transition); font-size: 0.875rem;
      }
      .country-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }
      .country-btn.active {
        background: var(--primary); border-color: var(--primary); color: white;
        box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
      }

      .content-area { flex: 1; padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
      .status-bar { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; font-size: 0.875rem; color: var(--text-muted); }
      .live-indicator { display: flex; align-items: center; gap: 0.5rem; color: var(--live-color); font-weight: 600; }
      .pulse { width: 8px; height: 8px; background: var(--live-color); border-radius: 50%; animation: pulse 1.5s infinite; }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }

      .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; }
      .news-card {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        border-radius: 1.25rem; overflow: hidden; transition: var(--transition);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        display: flex; flex-direction: column;
      }
      .news-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); }
      .card-img-wrapper { aspect-ratio: 16/9; overflow: hidden; background: #1e293b; }
      .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
      .news-card:hover img { transform: scale(1.05); }
      .card-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
      .card-source { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
      .card-title { font-family: var(--font-display); font-size: 1.2rem; line-height: 1.4; margin-bottom: 0.75rem; color: var(--text-main); }
      .card-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
      .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--glass-border); }
      .card-time { font-size: 0.75rem; color: var(--text-muted); }
      .read-more { font-size: 0.85rem; font-weight: 600; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }

      /* Skeleton */
      .skeleton-card { height: 400px; background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 1.25rem; position: relative; overflow: hidden; }
      .skeleton-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 100% { transform: translateX(100%); } }

      .glass-footer { padding: 2rem; text-align: center; border-top: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.8rem; }
      
      /* Modal Styles */
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
        opacity: 0; transition: opacity 0.3s ease;
      }
      .modal-content {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        padding: 2.5rem; border-radius: 1.5rem; width: 90%; max-width: 500px;
        text-align: center;
      }
      .modal-content h2 { margin-bottom: 1rem; font-family: var(--font-display); }
      .modal-content p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
      .modal-content input {
        width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
        color: white; margin-bottom: 1.5rem; font-family: inherit;
      }
      .modal-actions { display: flex; gap: 1rem; justify-content: center; }
      .primary-btn {
        background: var(--primary); color: white; border: none;
        padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer;
        font-weight: 600; transition: var(--transition);
      }
      .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }
      .text-btn { background: transparent; color: var(--text-muted); border: none; cursor: pointer; }

      @media (max-width: 768px) {
        .glass-header { flex-direction: column; gap: 1rem; }
        .country-selector { overflow-x: auto; width: 100%; padding-bottom: 0.5rem; }
        .country-btn { white-space: nowrap; }
        .news-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="glass-header">
        <div class="logo">
          <i data-lucide="globe"></i>
          <h1>Global <span>Horizon</span></h1>
        </div>
        <nav class="country-selector">
          <button class="country-btn active" data-country="jp" data-lang="ja">日本</button>
          <button class="country-btn" data-country="us" data-lang="en">USA</button>
          <button class="country-btn" data-country="gb" data-lang="en">UK</button>
          <button class="country-btn" data-country="fr" data-lang="fr">France</button>
          <button class="country-btn" data-country="de" data-lang="de">Germany</button>
          <button class="country-btn" data-country="cn" data-lang="zh">中国</button>
          <button id="settings-btn" class="country-btn" title="API設定"><i data-lucide="settings" size="16"></i></button>
        </nav>
      </header>

      <!-- API Key Modal -->
      <div id="api-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card">
          <h2>API設定</h2>
          <p>ニュースを取得するには <a href="https://gnews.io/" target="_blank">GNews</a> のAPIキーが必要です。</p>
          <input type="text" id="api-key-input" placeholder="APIキーを入力してください" />
          <div class="modal-actions">
            <button id="save-api-key" class="primary-btn">保存して更新</button>
            <button id="close-modal" class="text-btn">閉じる</button>
          </div>
        </div>
      </div>
      <main class="content-area">
        <div class="status-bar">
          <span class="live-indicator"><span class="pulse"></span> LIVE</span>
          <span class="current-region">日本 - 最新ニュース</span>
          <span class="timestamp" id="last-updated">更新中...</span>
        </div>
        <div id="news-grid" class="news-grid"></div>
      </main>
      <footer class="glass-footer">
        <p>&copy; 2026 Global Horizon News. Powered by GNews API.</p>
      </footer>
    </div>

    <script>
      let GNEWS_API_KEY = localStorage.getItem('GNEWS_API_KEY') || '';
      const newsGrid = document.getElementById('news-grid');
      const regionDisplay = document.querySelector('.current-region');
      const lastUpdated = document.getElementById('last-updated');
      const apiModal = document.getElementById('api-modal');
      const apiKeyInput = document.getElementById('api-key-input');
      
      let currentCountry = 'jp';
      let currentLang = 'ja';

      function init() {
        lucide.createIcons();
        apiKeyInput.value = GNEWS_API_KEY;

        if (!GNEWS_API_KEY) {
          showModal();
        } else {
          fetchNews(currentCountry, currentLang);
        }
        
        // Settings Button
        document.getElementById('settings-btn').addEventListener('click', showModal);
        document.getElementById('close-modal').addEventListener('click', hideModal);
        document.getElementById('save-api-key').addEventListener('click', () => {
          const newKey = apiKeyInput.value.trim();
          if (newKey) {
            GNEWS_API_KEY = newKey;
            localStorage.setItem('GNEWS_API_KEY', newKey);
            hideModal();
            fetchNews(currentCountry, currentLang);
          }
        });

        document.querySelectorAll('.country-btn[data-country]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const country = e.currentTarget.dataset.country;
            const lang = e.currentTarget.dataset.lang;
            if (country === currentCountry) return;
            
            document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            currentCountry = country;
            currentLang = lang;
            regionDisplay.textContent = `${e.currentTarget.textContent} - 最新ニュース`;
            fetchNews(currentCountry, currentLang);
          });
        });
      }

      function showModal() {
        apiModal.style.display = 'flex';
        gsap.to(apiModal, { opacity: 1, duration: 0.3 });
      }

      function hideModal() {
        gsap.to(apiModal, { opacity: 0, duration: 0.3, onComplete: () => {
          apiModal.style.display = 'none';
        }});
      }

      async function fetchNews(country, lang) {
        if (!GNEWS_API_KEY) {
          showModal();
          return;
        }

        newsGrid.innerHTML = '';
        for(let i=0; i<6; i++) newsGrid.innerHTML += '<div class="skeleton-card"></div>';
        
        try {
          const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=${lang}&country=${country}&max=12&apikey=${GNEWS_API_KEY}`);
          
          if (res.status === 401 || res.status === 403) {
            throw new Error('Unauthorized');
          }

          const data = await res.json();
          if (data.articles) {
            renderArticles(data.articles);
          } else {
            throw new Error('No articles');
          }
        } catch (err) {
          if (err.message === 'Unauthorized') {
            newsGrid.innerHTML = `
              <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                <p style="margin-bottom: 1rem; color: #ef4444;">APIキーが無効、または期限切れです。</p>
                <button onclick="showModal()" class="primary-btn">APIキーを設定する</button>
              </div>
            `;
          } else {
            newsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">ニュースの取得に失敗しました。</p>';
          }
        }
      }

      function renderArticles(articles) {
        newsGrid.innerHTML = '';
        articles.forEach((art, i) => {
          const card = document.createElement('div');
          card.className = 'news-card';
          card.style.opacity = 0;
          card.innerHTML = `
            <div class="card-img-wrapper"><img src="${art.image || 'https://via.placeholder.com/800x450/1e293b/94a3b8?text=Global+News'}" alt=""></div>
            <div class="card-content">
              <span class="card-source">${art.source.name}</span>
              <h3 class="card-title">${art.title}</h3>
              <p class="card-desc">${art.description || ''}</p>
              <div class="card-footer">
                <span class="card-time">${new Date(art.publishedAt).toLocaleTimeString()}</span>
                <a href="${art.url}" target="_blank" class="read-more">記事を読む <i data-lucide="arrow-right" size="16"></i></a>
              </div>
            </div>
          `;
          newsGrid.appendChild(card);
          gsap.to(card, { opacity: 1, y: 0, from: {y: 20}, duration: 0.6, delay: i * 0.1 });
        });
        lucide.createIcons();
        lastUpdated.textContent = `最終更新: ${new Date().toLocaleTimeString()}`;
      }

      init();
    </script>
  </body>
</html>
