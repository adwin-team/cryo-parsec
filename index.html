<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Horizon | リアルタイム世界ニュース</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      :root {
        --primary: #4f46e5;
        --secondary: #94a3b8;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --live-color: #ef4444;
        --font-display: 'Playfair Display', serif;
        --font-main: 'Outfit', sans-serif;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: var(--font-main);
        line-height: 1.5;
        overflow-x: hidden;
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        min-height: 100vh;
      }

      #app { display: flex; flex-direction: column; min-height: 100vh; }

      .glass-header {
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        background: rgba(15, 23, 42, 0.8);
        border-bottom: 1px solid var(--glass-border);
        padding: 1.25rem 2rem;
        display: flex; justify-content: space-between; align-items: center;
      }

      .logo { display: flex; align-items: center; gap: 0.75rem; }
      .logo i { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
      .logo h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; }
      .logo h1 span { font-weight: 300; opacity: 0.8; }

      .country-selector { display: flex; gap: 0.5rem; }
      .country-btn {
        background: transparent; border: 1px solid var(--glass-border);
        color: var(--text-main); padding: 0.5rem 1rem; border-radius: 9999px;
        cursor: pointer; transition: var(--transition); font-size: 0.875rem;
      }
      .country-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }
      .country-btn.active {
        background: var(--primary); border-color: var(--primary); color: white;
        box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
      }

      .content-area { flex: 1; padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
      .status-bar { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; font-size: 0.875rem; color: var(--text-muted); }
      .live-indicator { display: flex; align-items: center; gap: 0.5rem; color: var(--live-color); font-weight: 600; }
      .pulse { width: 8px; height: 8px; background: var(--live-color); border-radius: 50%; animation: pulse 1.5s infinite; }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }

      .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; }
      .news-card {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        border-radius: 1.25rem; overflow: hidden; transition: var(--transition);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        display: flex; flex-direction: column;
      }
      .news-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); }
      .card-img-wrapper { aspect-ratio: 16/9; overflow: hidden; background: #1e293b; }
      .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
      .news-card:hover img { transform: scale(1.05); }
      .card-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
      .card-source { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
      .card-title { font-family: var(--font-display); font-size: 1.25rem; line-height: 1.4; color: var(--text-main); margin-bottom: 1rem; }
      .card-desc { font-size: 0.9375rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 0.75rem; }
      .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--glass-border); margin-top: auto; }
      .card-time { font-size: 0.75rem; color: var(--text-muted); }
      .read-more { font-size: 0.85rem; font-weight: 600; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }

      /* Skeleton */
      .skeleton-card { height: 400px; background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 1.25rem; position: relative; overflow: hidden; }
      .skeleton-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 100% { transform: translateX(100%); } }

      .glass-footer { padding: 2rem; text-align: center; border-top: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.8rem; }
      
      /* Modal Styles */
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
        opacity: 0; transition: opacity 0.3s ease;
      }
      .modal-content {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        padding: 2.5rem; border-radius: 1.5rem; width: 90%; max-width: 500px;
        text-align: center;
      }
      .modal-content h2 { margin-bottom: 1rem; font-family: var(--font-display); }
      .modal-content p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
      .modal-content input {
        width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
        color: white; margin-bottom: 1.5rem; font-family: inherit;
      }
      .modal-actions { display: flex; gap: 1rem; justify-content: center; }
      .primary-btn {
        background: var(--primary); color: white; border: none;
        padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer;
        font-weight: 600; transition: var(--transition);
      }
      .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }
      .text-btn { background: transparent; color: var(--text-muted); border: none; cursor: pointer; }

      .modal-content input, .modal-content select {
        width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
        background: #1e293b; border: 1px solid var(--glass-border);
        color: white; margin-bottom: 1rem; font-family: inherit;
        appearance: none;
      }
      .modal-field { text-align: left; margin-bottom: 1rem; }
      .modal-field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
      .modal-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
      .translation-badge {
        font-size: 0.65rem; background: var(--primary); color: white;
        padding: 0.15rem 0.4rem; border-radius: 0.3rem; vertical-align: middle;
        margin-left: 0.5rem; display: inline-block; font-style: normal;
      }
      .translated-text { color: var(--text-main); font-size: 0.95rem; font-weight: 400; border-left: 3px solid var(--primary); padding-left: 0.8rem; line-height: 1.5; margin-top: 0.25rem; }
      .original-block { color: var(--text-muted); font-size: 0.8rem; line-height: 1.4; font-weight: 300; display: block; }
      .clamped-text { display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

      @media (max-width: 768px) {
        .glass-header { flex-direction: column; gap: 1rem; }
        .country-selector { overflow-x: auto; width: 100%; padding-bottom: 0.5rem; }
        .country-btn { white-space: nowrap; }
        .news-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="glass-header">
        <div class="logo">
          <i data-lucide="globe"></i>
          <h1>Global <span>Horizon</span></h1>
        </div>
        <nav class="country-selector">
          <button class="country-btn active" data-country="jp" data-lang="ja">日本</button>
          <button class="country-btn" data-country="us" data-lang="en">USA</button>
          <button class="country-btn" data-country="gb" data-lang="en">UK</button>
          <button class="country-btn" data-country="fr" data-lang="fr">France</button>
          <button class="country-btn" data-country="de" data-lang="de">Germany</button>
          <button class="country-btn" data-country="cn" data-lang="zh">中国</button>
          <button id="settings-btn" class="country-btn" title="API設定"><i data-lucide="settings" size="16"></i></button>
        </nav>
      </header>

      <!-- API Key Modal -->
      <div id="api-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card">
          <h2>アプリ設定</h2>
          
          <div class="modal-field">
            <label>GNews APIキー</label>
            <input type="text" id="api-key-input" placeholder="APIキーを入力" />
          </div>

          <div class="modal-field">
            <label>標準の国 (起動時)</label>
            <select id="default-country-select">
              <option value="jp">日本</option>
              <option value="us">USA</option>
              <option value="gb">UK</option>
              <option value="fr">France</option>
              <option value="de">Germany</option>
              <option value="cn">中国</option>
            </select>
          </div>

          <div class="modal-field">
            <label>翻訳用 言語 (標準)</label>
            <select id="default-lang-select">
              <option value="ja">日本語</option>
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="zh">中国語</option>
            </select>
          </div>

          <div class="modal-field">
            <label>CORSプロキシ設定</label>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white; font-size: 0.9rem;">
                <input type="checkbox" id="use-internal-proxy" style="width: auto; margin-bottom: 0;"> 内蔵プロキシを使用する (推奨)
              </label>
              <div id="external-proxy-field" style="display: none; margin-top: 0.5rem;">
                <label style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; display: block;">カスタムプロキシURL</label>
                <input type="text" id="cors-proxy-input" placeholder="https://example.com/proxy/" style="margin-bottom: 0;" />
              </div>
            </div>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem;">※ 「内蔵プロキシ」を有効にすると、サーバー経由で安全にニュースを取得します。</p>
          </div>

          <p style="font-size: 0.75rem;">※ APIキーは <a href="https://gnews.io/" target="_blank">GNews</a> で取得可能です。</p>
          
          <div class="modal-actions">
            <button id="save-settings" class="primary-btn">保存して更新</button>
            <button id="close-modal" class="text-btn">閉じる</button>
          </div>
        </div>
      </div>
      <main class="content-area">
        <div class="status-bar">
          <span class="live-indicator"><span class="pulse"></span> LIVE</span>
          <span class="current-region">日本 - 最新ニュース</span>
          <span class="timestamp" id="last-updated">更新中...</span>
        </div>
        <div id="news-grid" class="news-grid"></div>
      </main>
      <footer class="glass-footer">
        <p>&copy; 2026 Global Horizon News. Powered by GNews API.</p>
      </footer>
    </div>

    <script>
      let GNEWS_API_KEY = localStorage.getItem('GNEWS_API_KEY') || '';
      let DEFAULT_COUNTRY = localStorage.getItem('DEFAULT_COUNTRY') || 'jp';
      let DEFAULT_LANG = localStorage.getItem('DEFAULT_LANG') || 'ja';
      let CORS_PROXY = localStorage.getItem('CORS_PROXY') || '';
      let USE_INTERNAL_PROXY = localStorage.getItem('USE_INTERNAL_PROXY') !== 'false'; // Default to true
      
      const newsGrid = document.getElementById('news-grid');
      const regionDisplay = document.querySelector('.current-region');
      const lastUpdated = document.getElementById('last-updated');
      const apiModal = document.getElementById('api-modal');
      const apiKeyInput = document.getElementById('api-key-input');
      const countrySelect = document.getElementById('default-country-select');
      const langSelect = document.getElementById('default-lang-select');
      const corsProxyInput = document.getElementById('cors-proxy-input');
      const internalProxyCheck = document.getElementById('use-internal-proxy');
      const externalProxyField = document.getElementById('external-proxy-field');
      
      let currentCountry = DEFAULT_COUNTRY;
      let currentLang = 'ja'; // Will be set by button data

      function init() {
        lucide.createIcons();
        apiKeyInput.value = GNEWS_API_KEY;
        countrySelect.value = DEFAULT_COUNTRY;
        langSelect.value = DEFAULT_LANG;
        corsProxyInput.value = CORS_PROXY;
        internalProxyCheck.checked = USE_INTERNAL_PROXY;
        externalProxyField.style.display = USE_INTERNAL_PROXY ? 'none' : 'block';

        internalProxyCheck.addEventListener('change', (e) => {
          externalProxyField.style.display = e.target.checked ? 'none' : 'block';
        });

        // Set initial active button
        const initialBtn = document.querySelector(`.country-btn[data-country="${currentCountry}"]`);
        if (initialBtn) {
          document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
          initialBtn.classList.add('active');
          currentLang = initialBtn.dataset.lang;
          regionDisplay.textContent = `${initialBtn.textContent} - 最新ニュース`;
        }

        if (!GNEWS_API_KEY) {
          showModal();
        } else {
          fetchNews(currentCountry, currentLang);
        }
        
        document.getElementById('settings-btn').addEventListener('click', showModal);
        document.getElementById('close-modal').addEventListener('click', hideModal);
        document.getElementById('save-settings').addEventListener('click', () => {
          const newKey = apiKeyInput.value.trim();
          if (newKey) {
            GNEWS_API_KEY = newKey;
            localStorage.setItem('GNEWS_API_KEY', newKey);
          }
          DEFAULT_COUNTRY = countrySelect.value;
          DEFAULT_LANG = langSelect.value;
          CORS_PROXY = corsProxyInput.value.trim();
          USE_INTERNAL_PROXY = internalProxyCheck.checked;
          
          localStorage.setItem('DEFAULT_COUNTRY', DEFAULT_COUNTRY);
          localStorage.setItem('DEFAULT_LANG', DEFAULT_LANG);
          localStorage.setItem('CORS_PROXY', CORS_PROXY);
          localStorage.setItem('USE_INTERNAL_PROXY', USE_INTERNAL_PROXY);
          
          hideModal();
          
          // Apply changes immediately (reload for current country)
          fetchNews(currentCountry, currentLang);
        });

        document.querySelectorAll('.country-btn[data-country]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const country = e.currentTarget.dataset.country;
            const lang = e.currentTarget.dataset.lang;
            if (country === currentCountry) return;
            
            document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            currentCountry = country;
            currentLang = lang;
            regionDisplay.textContent = `${e.currentTarget.textContent} - 最新ニュース`;
            fetchNews(currentCountry, currentLang);
          });
        });
      }

      function showModal() {
        apiModal.style.display = 'flex';
        gsap.to(apiModal, { opacity: 1, duration: 0.3 });
      }

      function hideModal() {
        gsap.to(apiModal, { opacity: 0, duration: 0.3, onComplete: () => {
          apiModal.style.display = 'none';
        }});
      }

      async function fetchNews(country, lang) {
        if (!GNEWS_API_KEY) {
          showModal();
          return;
        }

        newsGrid.innerHTML = '';
        for(let i=0; i<6; i++) newsGrid.innerHTML += '<div class="skeleton-card"></div>';
        
        try {
          const apiURL = `https://gnews.io/api/v4/top-headlines?category=general&lang=${lang}&country=${country}&max=12&apikey=${GNEWS_API_KEY}`;
          let fetchURL = apiURL;
          
          if (USE_INTERNAL_PROXY) {
            fetchURL = `/api/proxy?url=${encodeURIComponent(apiURL)}`;
          } else if (CORS_PROXY) {
            fetchURL = (CORS_PROXY.endsWith('/') ? CORS_PROXY : CORS_PROXY + '/') + apiURL;
          }
          
          const res = await fetch(fetchURL);
          
          if (res.status === 401 || res.status === 403) {
            throw new Error('Unauthorized');
          }

          const data = await res.json();
          if (data.articles) {
            renderArticles(data.articles, lang);
          } else {
            throw new Error('No articles');
          }
        } catch (err) {
          if (err.message === 'Unauthorized') {
            newsGrid.innerHTML = `
              <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                <p style="margin-bottom: 1rem; color: #ef4444;">APIキーが無効、または期限切れです。</p>
                <button onclick="showModal()" class="primary-btn">APIキーを設定する</button>
              </div>
            `;
          } else {
            newsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">ニュースの取得に失敗しました。</p>';
          }
        }
      }

      async function renderArticles(articles, newsLang) {
        newsGrid.innerHTML = '';
        
        const needsTranslation = newsLang !== DEFAULT_LANG;

        for (const [i, art] of articles.entries()) {
          const card = document.createElement('div');
          card.className = 'news-card';
          card.style.opacity = 0;
          
          let titleDisplay = `<h3 class="card-title">${art.title}</h3>`;
          let descDisplay = `<p class="card-desc">${art.description || ''}</p>`;

          if (needsTranslation && art.title) {
            try {
              // Parallel fetch for description if available
              const [trTitle, trDesc] = await Promise.all([
                translateText(art.title, newsLang, DEFAULT_LANG),
                art.description ? translateText(art.description, newsLang, DEFAULT_LANG) : Promise.resolve('')
              ]);
              
              titleDisplay = `
                <div class="card-title">
                  <div class="original-block">${art.title}</div>
                  <div class="translated-text">${trTitle} <span class="translation-badge">翻訳</span></div>
                </div>
              `;
              descDisplay = `
                <div class="card-desc">
                  <div>
                    <div class="original-block">${art.description || ''}</div>
                    <div class="translated-text">${trDesc}</div>
                  </div>
                </div>
              `;
            } catch (e) {
              console.error('Translation failed', e);
            }
          } else {
             // Single language display
             titleDisplay = `<h3 class="card-title clamped-text">${art.title}</h3>`;
             descDisplay = `<div class="card-desc"><p class="clamped-text">${art.description || ''}</p></div>`;
          }

          card.innerHTML = `
            <div class="card-img-wrapper"><img src="${art.image || 'https://via.placeholder.com/800x450/1e293b/94a3b8?text=Global+News'}" alt=""></div>
            <div class="card-content">
              <span class="card-source">${art.source.name}</span>
              ${titleDisplay}
              ${descDisplay}
              <div class="card-footer">
                <span class="card-time">${new Date(art.publishedAt).toLocaleTimeString()}</span>
                <a href="${art.url}" target="_blank" class="read-more">記事を読む <i data-lucide="arrow-right" size="16"></i></a>
              </div>
            </div>
          `;
          newsGrid.appendChild(card);
          gsap.to(card, { opacity: 1, y: 0, from: {y: 20}, duration: 0.6, delay: i * 0.1 });
        }
        
        lucide.createIcons();
        lastUpdated.textContent = `最終更新: ${new Date().toLocaleTimeString()}`;
      }

      async function translateText(text, from, to) {
        if (!text) return '';
        try {
          const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
          const data = await res.json();
          return data.responseData.translatedText || text;
        } catch (e) {
          return text;
        }
      }

      init();
    </script>
  </body>
</html>
